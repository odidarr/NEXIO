<!DOCTYPE html>
<html>
<head>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #222;
  padding-top: 80px;
}



/* glow biru + merah */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;

  background:
    radial-gradient(circle at 20% 25%, rgba(0, 140, 255, 0.22), transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.20), transparent 50%);

  z-index: 0;
}

.contact-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

.contact-card{

    position:relative;

    width:600px;
    max-width:90%;

    padding:45px;

    background:
        linear-gradient(
            180deg,
            rgba(8,20,33,.95),
            rgba(14,35,55,.95)
        );

    border:2px solid #28D9FF;

    border-radius:20px;

    box-shadow:
        0 0 10px rgba(40,217,255,.45),
        0 0 30px rgba(40,217,255,.2),
        inset 0 0 20px rgba(40,217,255,.08);

    text-align:center;

    overflow:hidden;

    animation: floatCard 4s ease-in-out infinite;
}

.contact-card .bolt{
    position:absolute;
    width:14px;
    height:14px;
    border-radius:50%;
    background:radial-gradient(circle,#f5f5f5,#7a7a7a);
    border:1px solid #555;
}

.contact-card::after{

    content:"";

    position:absolute;

    inset:0;

    background:
        repeating-linear-gradient(
            180deg,
            rgba(255,255,255,.03) 0px,
            rgba(255,255,255,.03) 2px,
            transparent 2px,
            transparent 5px
        );

    pointer-events:none;
}

.contact-card::before{

    content:"";

    position:absolute;

    width:260px;
    height:260px;

    background:radial-gradient(
        circle,
        rgba(64,33,138,.35),
        rgba(30,47,216,.18),
        transparent 70%
    );

    filter:blur(60px);

    top:-80px;
    left:-80px;

    border-radius:50%;

    z-index:-1;
}

.contact-card h1{

    font-family:'Orbitron',sans-serif;

    font-size:36px;

    color:#28D9FF;

    letter-spacing:2px;

    text-transform:uppercase;

    text-shadow:
        0 0 8px rgba(40,217,255,.5);

    margin-bottom:30px;
}

.contact-card p{

    color:#E8F9FF;

    font-size:20px;

    line-height:1.8;
}

.contact-card a{

    color:#28D9FF;

    text-decoration:none;

    font-weight:700;

    transition:.3s;
}

.contact-card a:hover{

    color:white;

    text-shadow:
        0 0 10px #28D9FF;
}

@keyframes floatCard{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

}

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;

    background:
    radial-gradient(circle at 15% 20%, rgba(80,180,255,.25), transparent 30%),
    radial-gradient(circle at 90% 80%, rgba(255,255,255,.08), transparent 25%);
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.08;

    background:
    repeating-linear-gradient(
        -45deg,
        transparent 0px,
        transparent 40px,
        rgba(255,255,255,.5) 41px,
        transparent 42px
    );
}

</style>


</head>
<body>

<div class="contact-container">

</body>
</html>
