<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products - Orion Multi Makmur</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #222;
  padding-top: 80px;
}



/* glow biru + merah */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;

  background:
    radial-gradient(circle at 20% 25%, rgba(0, 140, 255, 0.22), transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.20), transparent 50%);

  z-index: 0;
}

/* semua konten di atas background */
body > * {
  position: relative;
  z-index: 1;
}

/* HEADER */
header{
    background: #ffffffe7;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom: 2px solid #c71d1d;
    box-shadow:
        0 0 8px #9b0000,
        0 0 18px rgba(155,0,0,.5);

    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    box-sizing: border-box;
}

.logo{
    display:flex;
    align-items:center;
}

.logo img{
    height:60px;
    width:auto;
    display:block;
}

nav{
    display:flex;
    align-items:center;
    gap:25px;
}

nav a{
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #222;
    text-decoration: none;
    transition: .3s;
}

nav a:hover{
    color:#0d47a1;
}

.signup-btn{
    background:#f02929;
    color:white;
    padding:10px 20px;
    border-radius:8px;
}

.signup-btn:hover{
    background:#08306b;
    color:white;
}

.products{
    max-width:1200px;
    margin:40px auto;
    padding:20px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.product-card{
    background:white;
    border-radius:15px;
    padding:15px;
    border:1px solid #e5e7eb;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.product-card:hover{
    transform:translateY(-5px);
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.product-image{
    width:100%;
    height:300px;
    object-fit:contain;
    border-radius:10px;
    margin-bottom:15px;
}

.product-name{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.product-price{
    color:#0d47a1;
    font-weight:bold;
}

@media(max-width:768px){
    .product-grid{
        grid-template-columns:1fr;
    }
}

.floating-access{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:9999;
}

.floating-btn{
    display:inline-block;
    background:#f02929;
    color:white;
    text-decoration:none;
    padding:14px 30px;
    border-radius:30px;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.25);
    transition:0.2s;
}

.floating-btn:hover{
    background:#08357f;
}

.floating-btn:active{
    transform:scale(0.95);
}

/* ========================= */
/* BACK BUTTON */
/* ========================= */

.back-wrapper{
    max-width:1200px;
    margin:50px auto 0;
    padding:0 20px;
}

.back-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;

    padding:12px 22px;

    background:#0F2036;

    color:#27D9FF;

    text-decoration:none;

    border:2px solid #27D9FF;

    border-radius:10px;

    font-size:16px;

    font-weight:600;

    transition:.3s;

    box-shadow:
        0 0 12px rgba(39,217,255,.25);
}

.back-btn:hover{

    background:#27D9FF;

    color:#081521;

    transform:translateX(-4px);

    box-shadow:
        0 0 18px rgba(39,217,255,.45);

}

.cart-btn{

    flex:1;

    margin-top:0;

    padding:12px;

    background:#0d47a1;

    color:white;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-weight:bold;

    transition:.25s;

}

.cart-btn:hover{

    background:#1565c0;

}

.toast{

    position:fixed;

    right:25px;

    bottom:25px;

    background:#0d47a1;

    color:white;

    padding:15px 22px;

    border-radius:10px;

    font-weight:600;

    box-shadow:0 8px 20px rgba(0,0,0,.25);

    opacity:0;

    visibility:hidden;

    transform:translateY(20px);

    transition:.35s;

    z-index:9999;

}

.toast.show{

    opacity:1;

    visibility:visible;

    transform:translateY(0);

}

.cart-icon{

    position:relative;

    color:white;

    text-decoration:none;

    font-size:24px;

}

#cartCount{

    position:absolute;

    top:-10px;

    right:-12px;

    background:#ff2d2d;

    color:white;

    width:22px;

    height:22px;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:12px;

    font-weight:bold;

}

.cart-action{

    display:flex;

    align-items:center;

    gap:12px;

    margin-top:12px;

}

.qty-control{

    display:none;

    align-items:center;

    gap:8px;

    white-space:nowrap;

}

.qty-control button{

    width:32px;

    height:32px;

    border:none;

    border-radius:8px;

    background:#0d47a1;

    color:white;

    cursor:pointer;

    font-size:18px;

}

.qty-control span{

    min-width:20px;

    text-align:center;

    font-weight:bold;

}

.cart-action{

    display:flex;

    align-items:center;

    gap:12px;

    margin-top:12px;

}

.qty-control{

    display:none;

    align-items:center;

    gap:10px;

}

.qty-control button{

    width:32px;

    height:32px;

    border:none;

    border-radius:6px;

    background:#0d47a1;

    color:white;

    cursor:pointer;

    font-weight:bold;

}

.qty-control span{

    min-width:20px;

    text-align:center;

    font-weight:bold;

}

.skeleton-grid{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:25px;

}

.skeleton-card{

    background:white;

    border-radius:15px;

    padding:15px;

    box-shadow:0 6px 20px rgba(0,0,0,.08);

}

.skeleton-image{

    width:100%;

    height:300px;

    border-radius:10px;

    background:linear-gradient(
        90deg,
        #ececec 25%,
        #f8f8f8 50%,
        #ececec 75%
    );

    background-size:200% 100%;

    animation:shimmer 1.2s infinite;

}

.skeleton-line{

    height:18px;

    border-radius:6px;

    margin-top:15px;

    background:linear-gradient(
        90deg,
        #ececec 25%,
        #f8f8f8 50%,
        #ececec 75%
    );

    background-size:200% 100%;

    animation:shimmer 1.2s infinite;

}

.skeleton-line.short{

    width:60%;

}

@keyframes shimmer{

    0%{
        background-position:200% 0;
    }

    100%{
        background-position:-200% 0;
    }

}

.filter-container{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin:25px 0;

}

.filter-btn{

    padding:10px 18px;

    border:none;

    border-radius:25px;

    background:#e5e5e5;

    cursor:pointer;

    transition:.25s;

    font-weight:bold;

}

.filter-btn:hover{

    background:#0d47a1;

    color:white;

}

.filter-btn.active{

    background:#0d47a1;

    color:white;

}

</style>
</head>
<body>

    <div class="logo">
    <img src="logo nexio removebg.png" alt="NEXIO Logo">

    <nav>

<a href="#" id="productsMenu">Products</a>

</div>

<script>

if(keyword){

    const products =
        document.querySelectorAll(".product-card");

    products.forEach(product => {

        const name =
            product.querySelector(".product-name")
            .textContent
            .toLowerCase();

        if(
            !name.includes(
                keyword.toLowerCase()
            )
        ){
            product.style.display = "none";
        }

    });

}

</script>

<script>

const params = new URLSearchParams(window.location.search);
const keyword = params.get("search");

if(keyword){

    const products =
        Array.from(document.querySelectorAll(".product-card"));

    products.forEach(product => {

        const name =
            product.querySelector(".product-name")
            .textContent
            .toLowerCase();

        if(!name.includes(keyword.toLowerCase())){
            product.style.display = "none";
        }

    });

}

</script>

<div class="floating-access">
    <a href="paket.html" class="floating-btn">
        DAPATKAN AKSES HARGA KHUSUS
    </a>
</div>

<script>

function tambahKeranjang(nama,harga,id){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const index = cart.findIndex(item=>item.nama===nama);

    if(index>-1){

        cart[index].qty++;

    }else{

        cart.push({

            nama:nama,
            harga:harga,
            qty:1

        });

    }

    localStorage.setItem("cart",JSON.stringify(cart));

    updateCartBadge();

    showToast();

    updateQty(id,nama);

}

function updateQty(id, nama){

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    const item = cart.find(p => p.nama === nama);

    const box = document.getElementById("qty-"+id);

    if(!box) return;

    if(!item){

        box.style.display = "none";
        return;

    }

    box.style.display = "flex";
    box.querySelector("span").innerText = item.qty;

}

function updateCartBadge(){

    const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    let total = 0;

    cart.forEach(item=>{

        total += item.qty;

    });

    document.getElementById("cartCount").innerText = total;

}

updateCartBadge();

function showToast(){

    const toast =
    document.getElementById("toast");

    toast.classList.add("show");

    setTimeout(function(){

        toast.classList.remove("show");

    },2000);

}

function ubahTombol(btn,nama){

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    const produk = cart.find(item=>item.nama===nama);

    if(!produk){

        btn.innerHTML="🛒 Tambah ke Keranjang";

        return;

    }

    const qtyBox = document.getElementById("qty-"+nama);

qtyBox.style.display = "flex";

qtyBox.querySelector("span").innerText = produk.qty;

}

function tambahProduk(nama,id){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const item = cart.find(p => p.nama===nama);

    if(item){

        item.qty++;

        localStorage.setItem("cart",JSON.stringify(cart));

        updateQty(id,nama);

        updateCartBadge();

    }

}

function kurangiProduk(nama,id){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const index = cart.findIndex(p => p.nama===nama);

    if(index==-1) return;

    cart[index].qty--;

    if(cart[index].qty<=0){

        cart.splice(index,1);

    }

    localStorage.setItem("cart",JSON.stringify(cart));

    updateQty(id,nama);

    updateCartBadge();

}

</script>

<div id="toast" class="toast">
    ✅ Produk berhasil ditambahkan ke keranjang
</div>

<script src="script.js"></script>
